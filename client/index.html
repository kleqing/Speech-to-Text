<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speech to Text Demo</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <main class="app-shell">
        <section class="card">
            <h1>Speech to Text</h1>
            <p id="pageSubtitle" class="subtitle">Login is required before using upload or microphone transcription.</p>

            <div id="authGate" class="auth-gate hidden">
                <p class="auth-message">You are not logged in.</p>
                <a class="btn" href="./login.html">Go to Login</a>
            </div>

            <div id="appSection" class="hidden">
                <div class="controls">
                    <input id="audioFile" type="file" accept="audio/*" hidden />
                    <button id="uploadButton" class="btn">Upload Audio File</button>
                    <button id="recordButton" class="btn btn-secondary">Start Recording</button>
                    <button id="logoutButton" class="btn btn-ghost">Logout</button>
                </div>

                <p id="status" class="status">Ready.</p>

                <section class="result" aria-live="polite">
                    <h2>Transcript</h2>
                    <pre id="transcript">Your transcript will appear here.</pre>
                </section>
            </div>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
